  <text x="450" y="520" text-anchor="middle" fill="#8A9BB5" font-size="10" font-weight="600" letter-spacing="1.5">CROSS-SWARM INHERITANCE</text>
  <rect x="180" y="532" width="540" height="48" rx="12" fill="#0D1428" stroke="#1E2D4A" stroke-width="1"/>
  <text x="450" y="551" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="600">New swarm can inherit verified insights from an anchored snapshot</text>
  <text x="450" y="568" text-anchor="middle" fill="#8A9BB5" font-size="10">Root hash resolves on-chain · PoRA verifies the content · provenance remains traceable</text>
